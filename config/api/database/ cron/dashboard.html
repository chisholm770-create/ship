<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Enterprise Logistics Dashboard</h1>
            <nav>
                <a href="dashboard.html">Dashboard</a>
                <a href="tracking.html">Tracking</a>
                <a href="payments.html">Payments</a>
            </nav>
        </header>
        
        <main>
            <section class="stats">
                <div class="stat-box">
                    <h3>Total Shipments</h3>
                    <p id="total-shipments">Loading...</p>
                </div>
                <div class="stat-box">
                    <h3>In Transit</h3>
                    <p id="in-transit">Loading...</p>
                </div>
                <div class="stat-box">
                    <h3>Delivered</h3>
                    <p id="delivered">Loading...</p>
                </div>
                <div class="stat-box">
                    <h3>Pending</h3>
                    <p id="pending">Loading...</p>
                </div>
            </section>
            
            <section class="shipments">
                <h2>Recent Shipments</h2>
                <table id="shipments-table">
                    <thead>
                        <tr>
                            <th>Tracking #</th>
                            <th>Origin</th>
                            <th>Destination</th>
                            <th>Status</th>
                            <th>Weight</th>
                        </tr>
                    </thead>
                    <tbody id="shipments-body">
                        <tr><td colspan="5">Loading...</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="js/dashboard.js"></script>
</body>
</html>
